services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticketbook-backend
    restart: unless-stopped
    volumes:
      - db_data:/data
    environment:
      - FLASK_ENV=production
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: nginx:alpine
    container_name: ticketbook-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
